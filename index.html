<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Clean - Player Sem Distrações</title>
    <style>
        :root {
            --primary: #ff0000;
            --dark: #121212;
            --light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #cc0000;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Stream Clean</h1>
    <p>Cole o link do vídeo abaixo para assistir em tela cheia.</p>
    
    <div class="input-group">
        <input type="text" id="videoLink" placeholder="Cole a URL do YouTube aqui...">
        <button onclick="loadVideo()">Assistir</button>
    </div>

    <div id="playerWrapper" class="video-container hidden">
        <iframe id="videoFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
</div>

<script>
    function loadVideo() {
        const urlInput = document.getElementById('videoLink').value;
        const playerWrapper = document.getElementById('playerWrapper');
        const iframe = document.getElementById('videoFrame');
        
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = urlInput.match(regExp);

        if (match && match[2].length == 11) {
            const videoId = match[2];
            // O parâmetro fs=1 garante que o botão de tela cheia apareça
            iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0&fs=1`;
            playerWrapper.classList.remove('hidden');
        } else {
            alert("Por favor, insira uma URL válida do YouTube.");
        }
    }
</script>

</body>
</html>
